<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presenty Beast | Parth Vishnu Yadav</title>
    <script defer src="face-api.min.js"></script>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --panel-bg: #161616;
            --neon-cyan: #00ff96;
            --premium-gold: #ffce00;
            --danger-red: #ff4444;
            --text-gray: #b0b0b0;
        }

        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 15px; text-align: center; border-bottom: 1px solid #333; background: var(--panel-bg); box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        header h1 { font-size: 1.4rem; margin: 0; color: white; text-transform: uppercase; letter-spacing: 3px; }
        
        .viewport { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 120px; }
        .page { display: none; }
        .page.active { display: block; }

        /* Scanning Page */
        #scan-page { text-align: center; }
        .video-container { position: relative; width: 90%; max-width: 400px; margin: 20px auto; border-radius: 25px; overflow: hidden; border: 3px solid var(--neon-cyan); box-shadow: 0 0 30px rgba(0, 255, 150, 0.2); background: #000; }
        video { width: 100%; display: block; transform: scaleX(-1); }
        .status-msg { margin-top: 20px; font-size: 1.2rem; color: var(--premium-gold); font-weight: bold; text-shadow: 0 0 10px rgba(255,206,0,0.3); }

        /* Buttons & Cards */
        .btn-main { background: linear-gradient(45deg, var(--neon-cyan), #00d1ff); border: none; padding: 18px; width: 100%; border-radius: 15px; color: black; font-weight: 800; font-size: 1rem; margin-bottom: 20px; cursor: pointer; }
        .card { background: var(--panel-bg); padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 5px solid var(--premium-gold); display: flex; justify-content: space-between; align-items: center; }
        
        /* Form */
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; }

        /* Navigation */
        .user-brand { position: fixed; bottom: 75px; width: 100%; text-align: center; color: var(--premium-gold); font-weight: bold; font-size: 0.9rem; letter-spacing: 2px; padding: 10px 0; background: rgba(10,10,10,0.9); z-index: 5; }
        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #111; display: flex; border-top: 1px solid #333; z-index: 10; }
        .nav-item { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--text-gray); font-size: 0.7rem; font-weight: bold; transition: 0.3s; }
        .nav-item.active { color: var(--neon-cyan); border-top: 3px solid var(--neon-cyan); }
        svg { width: 24px; height: 24px; margin-bottom: 4px; fill: currentColor; }

        .share-btn { background: #25D366; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<header><h1>Presenty Beast</h1></header>

<div class="viewport">
    <div id="scan-page" class="page active">
        <div class="video-container"><video id="video" autoplay muted playsinline></video></div>
        <div id="scan-status" class="status-msg">INITIALIZING AI...</div>
        <div class="user-brand">BY @PARTH VISHNU YADAV</div>
    </div>

    <div id="register-page" class="page">
        <button class="btn-main" onclick="openForm()">➕ REGISTER NEW STUDENT</button>
        <div id="student-list"></div>
    </div>

    <div id="database-page" class="page">
        <h3 style="color: var(--premium-gold);">📅 Attendance Reports</h3>
        <div id="reports-list"></div>
    </div>

    <div id="form-page" class="page">
        <div style="background: var(--panel-bg); padding: 25px; border-radius: 25px; border: 1px solid #333;">
            <h2 id="form-title" style="color: var(--neon-cyan);">Registration</h2>
            <input type="text" id="stu-name" placeholder="Student Name">
            <input type="tel" id="stu-parent" placeholder="Parent Number">
            <button class="btn-main" style="background: var(--premium-gold); color: black;" onclick="captureFace()">📸 CAPTURE FACE</button>
            <input type="text" id="stu-roll" readonly style="color: var(--premium-gold);">
            <button class="btn-main" onclick="saveStudent()">💾 SAVE DATA</button>
            <button onclick="showPage('register-page')" style="color:white; background:none; border:none; width:100%; margin-top:10px;">Cancel</button>
        </div>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showPage('scan-page', this)">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/><circle cx="12" cy="12" r="3"/></svg>
        <span>SCAN</span>
    </div>
    <div class="nav-item" onclick="showPage('register-page', this)">
        <svg viewBox="0 0 24 24"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        <span>REGISTER</span>
    </div>
    <div class="nav-item" onclick="showPage('database-page', this)">
        <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
        <span>REPORTS</span>
    </div>
</nav>

<script>
    let registeredStudents = JSON.parse(localStorage.getItem('beastStudents')) || [];
    let attendanceData = JSON.parse(localStorage.getItem('beastAttendance')) || {};
    let isModelsLoaded = false;
    let tempDescriptor = null;

    // --- PAGE CONTROL ---
    function showPage(pageId, navEl) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        if(navEl) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            navEl.classList.add('active');
        }
        if(pageId === 'database-page') renderReports();
        if(pageId === 'register-page') updateStudentList();
    }

    // --- AI & CAMERA LOGIC ---
    async function initBeast() {
        const status = document.getElementById('scan-status');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('video').srcObject = stream;
            
            status.innerText = "LOADING BRAINS...";
            await faceapi.nets.ssdMobilenetv1.loadFromUri('./models');
            await faceapi.nets.faceLandmark68Net.loadFromUri('./models');
            await faceapi.nets.faceRecognitionNet.loadFromUri('./models');
            
            isModelsLoaded = true;
            status.innerText = "BEAST IS READY!";
            startRecognition();
        } catch (err) {
            status.innerText = "CAMERA ERROR: Use HTTPS or Local Server";
        }
    }

    async function captureFace() {
        if(!isModelsLoaded) return alert("AI loading... please wait.");
        const video = document.getElementById('video');
        const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
        if(detection) {
            tempDescriptor = Array.from(detection.descriptor);
            alert("Face Captured! Click Save Data.");
        } else {
            alert("Face not detected. Look at camera!");
        }
    }

    function startRecognition() {
        const video = document.getElementById('video');
        const status = document.getElementById('scan-status');

        setInterval(async () => {
            if(!isModelsLoaded || registeredStudents.length === 0 || !document.getElementById('scan-page').classList.contains('active')) return;

            const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
            if(detections.length > 0) {
                const bestMatch = findMatch(detections[0].descriptor);
                if(bestMatch) {
                    const isNew = markPresent(bestMatch.name);
                    status.innerText = isNew ? `WELCOME ${bestMatch.name.toUpperCase()}!` : `NAMASKAR ${bestMatch.name}!`;
                    status.style.color = "var(--neon-cyan)";
                } else {
                    status.innerText = "UNKNOWN PERSON";
                    status.style.color = "red";
                }
            }
        }, 1500);
    }

    function findMatch(descriptor) {
        let match = null;
        let threshold = 0.55; 
        registeredStudents.forEach(stu => {
            if(!stu.face) return;
            const dist = faceapi.euclideanDistance(descriptor, new Float32Array(stu.face));
            if(dist < threshold) { threshold = dist; match = stu; }
        });
        return match;
    }

    // --- DATA LOGIC ---
    function markPresent(name) {
        const today = new Date().toLocaleDateString('en-GB').replace(/\//g, '-');
        if(!attendanceData[today]) attendanceData[today] = [];
        if(!attendanceData[today].includes(name)) {
            attendanceData[today].push(name);
            localStorage.setItem('beastAttendance', JSON.stringify(attendanceData));
            return true;
        }
        return false;
    }

    function saveStudent() {
        const name = document.getElementById('stu-name').value;
        const roll = document.getElementById('stu-roll').value;
        const parent = document.getElementById('stu-parent').value;
        if(!name || !tempDescriptor) return alert("Fill Name & Capture Face!");

        registeredStudents.push({ name, roll, parent, face: tempDescriptor });
        localStorage.setItem('beastStudents', JSON.stringify(registeredStudents));
        tempDescriptor = null;
        alert("Student Registered!");
        showPage('register-page');
    }

    function renderReports() {
        const list = document.getElementById('reports-list');
        list.innerHTML = "";
        Object.keys(attendanceData).sort().reverse().forEach(date => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<div><b>Presenty ${date}</b><br><small>${attendanceData[date].length} Present</small></div>
                             <button class="share-btn" onclick="share('${date}')">SHARE</button>`;
            list.appendChild(div);
        });
    }

    function share(date) {
        const text = `*Presenty Report: ${date}*\n\nStudents:\n- ${attendanceData[date].join('\n- ')}\n\n_By Presenty Beast_`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
    }

    function openForm() {
        document.getElementById('stu-roll').value = 10001 + registeredStudents.length;
        showPage('form-page');
    }

    function updateStudentList() {
        const list = document.getElementById('student-list');
        list.innerHTML = registeredStudents.map(s => `<div class="card"><b>${s.name}</b> <span>ID: ${s.roll}</span></div>`).reverse().join('');
    }

    window.onload = initBeast;
</script>
</body>
</html>
